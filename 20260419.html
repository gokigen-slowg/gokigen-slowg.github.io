    <h1>2026.4.19「無駄なこと」</h1>
    <p>心理学関連の本で過去と他人は変えられないっていうフレーズは有名だけど、<br>
    本当にそう。他人であろうと家族であろうと変えられないことは、その人の問題。<br>
    変えようと試みたり、感情的になることは本当に無駄なこと。<br>
    でもうちの親はそれがわからないみたい。<br>
    人の尻拭いをして毎回腹を立てるぐらいなら、やらなければいいのに。<br>
    尻拭いをしない選択もとれるのに、ホントうちの親はバカ。</p>
